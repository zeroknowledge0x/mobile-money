apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile-money
  labels:
    app: mobile-money
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mobile-money
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # one extra pod while rolling (blue-green style)
      maxUnavailable: 0  # never take a pod down before the new one is ready
  template:
    metadata:
      labels:
        app: mobile-money
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - "until pg_isready -h postgres-service -p 5432; do echo waiting for database; sleep 2; done;"
      containers:
        - name: mobile-money
          image: shantelpeters/mobile-money:latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-secrets
                  key: redis-url
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          # Readiness: pod only receives traffic once /ready returns 200
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 2   # must pass twice before marked ready
            failureThreshold: 3
          # Liveness: restart pod if /health fails repeatedly
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Startup: give the app up to 90 s to boot before liveness kicks in
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 18  # 18 × 5 s = 90 s max startup window
          lifecycle:
            preStop:
              exec:
                # Drain in-flight requests before the pod is removed
                command: ["/bin/sh", "-c", "sleep 5"]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mobile-money-pdb
spec:
  minAvailable: 2          # always keep at least 2 pods up during voluntary disruptions
  selector:
    matchLabels:
      app: mobile-money
