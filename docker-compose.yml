# docker-compose.yml
#
# Local development environment for sublime247/mobile-money.
# Starts the app alongside Postgres, Redis, and local mock services for Stellar and SMTP.
#
# Usage:
#   docker compose up          # start everything
#   docker compose up -d       # start in background
#   docker compose down        # stop and remove containers
#   docker compose down -v     # stop and wipe volumes (fresh DB)

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mobilemoney_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://user:password@postgres:5432/mobilemoney_stellar
      REDIS_URL: redis://redis:6379
      # Loki transport — optional, falls back to stdout when unset
      LOKI_HOST: ${LOKI_HOST:-http://loki:3100}
      SERVICE_NAME: ${SERVICE_NAME:-mobile-money-api}
    ports:
      - "3000:3000"
    networks:
      - mobilemoney_net
    logging:
      driver: "json-file"
      options:
        tag: "{{.Name}}"

  postgres:
    image: postgres:16-alpine
    container_name: mobilemoney_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mobilemoney_stellar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mobilemoney_stellar"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mobilemoney_net

  redis:
    image: redis:7-alpine
    container_name: mobilemoney_redis
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mobilemoney_net

  # ---------------------------------------------------------------------------
  # Mock SMTP Server (Maildev)
  # ---------------------------------------------------------------------------
  maildev:
    image: maildev/maildev:2.1.0
    container_name: mobilemoney_maildev
    restart: unless-stopped
    ports:
      - "1080:1080" # Web UI
      - "1025:1025" # SMTP Port
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1025 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Local Stellar Quickstart Node
  # ---------------------------------------------------------------------------
  stellar:
    image: stellar/quickstart:latest
    container_name: mobilemoney_stellar_quickstart
    restart: unless-stopped
    ports:
      - "8000:8000" # Horizon API / Faucet (Friendbot)
    command: ["--standalone", "--enable-horizon"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Application (live reload via ts-node-dev)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mobilemoney_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      maildev:
        condition: service_healthy
      stellar:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override the localhost URLs from .env to use Docker service names
      DATABASE_URL: postgresql://user:password@postgres:5432/mobilemoney_stellar
      REDIS_URL: redis://redis:6379
      SMTP_HOST: maildev
      SMTP_PORT: 1025
      STELLAR_HORIZON_URL: http://stellar:8000
      STELLAR_NETWORK: local
    ports:
      - "3100:3100"
    volumes:
      - ./logging/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - mobilemoney_net

  promtail:
    image: grafana/promtail:latest
    container_name: mobilemoney_promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logging/promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - mobilemoney_net

  grafana:
    image: grafana/grafana:latest
    container_name: mobilemoney_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./logging/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - mobilemoney_net

networks:
  mobilemoney_net:
    driver: bridge

volumes:
  grafana_data:
  redis_data: