auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /tmp/loki
  storage:
    filesystem:
      chunks_directory: /tmp/loki/chunks
      rules_directory: /tmp/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 744h # 31 days

ruler:
  alertmanager_url: http://localhost:9093
  rule_path: /tmp/loki/rules
  evaluation_interval: 30s
  alertmanager_ha: false
  storage:
    type: local
    local:
      directory: /tmp/loki/rules
  rules:
    - name: circuit_breaker_and_failover_rules
      interval: 30s
      rules:
        - alert: CircuitBreakerActivated
          expr: |
            sum(count_over_time({app="bridge"} |= "circuit breaker opened" [5m])) by (service) > 0
          for: 0s
          labels:
            severity: critical
            component: circuit-breaker
          annotations:
            summary: "Circuit breaker activated for {{ $labels.service }}"
            description: "Detected 'circuit breaker opened' messages in logs within the last 5 minutes."
        - alert: CircuitBreakerFailover
          expr: |
            sum(count_over_time({app="bridge"} |= "failover" [5m])) by (service) > 0
          for: 0s
          labels:
            severity: critical
            component: failover
          annotations:
            summary: "Failover detected for {{ $labels.service }}"
            description: "Detected failover-related log messages in the last 5 minutes."
