server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
    - targets:
        - localhost
      labels:
        job: varlogs
        __path__: /var/log/*log

  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
    pipeline_stages:
      # Parse JSON log lines
      - json:
          expressions:
            level: level
            msg: message
            time: "@timestamp"
            trace_id: trace_id
            instance_id: instance_id
            service: service.name
      # Promote trace_id and instance_id to labels for Grafana filtering
      - labels:
          level:
          trace_id:
          instance_id:
          service:
      # Drop the raw msg field to avoid duplication (message is already indexed)
      - output:
          source: msg
